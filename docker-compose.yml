version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: italia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: italia
      MYSQL_USER: italia
      MYSQL_PASSWORD: secret
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: italia_backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    env_file:
      - ./backend/.env.example
    depends_on:
      - mysql
    ports:
      - "18000:8000"
    command: sh -c "composer config --global process-timeout 2000 && composer install --no-interaction --prefer-dist --no-progress && php artisan migrate --seed --force && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: italia_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "5178:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: italia_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "18080:80"

  mailpit:
    image: axllent/mailpit:latest
    container_name: italia_mailpit
    restart: unless-stopped
    ports:
      - "18025:8025"
      - "11025:1025"

volumes:
  mysql_data:
  backend_vendor:
